services:
  - type: web
    name: the-synthetic-firm-api
    env: python
    plan: starter
    buildCommand: pip install -e ".[web,postgres]"
    startCommand: synthetic-firm serve-control-room-api --host 0.0.0.0 --port $PORT
    envVars:
      - key: TSF_STORE_BACKEND
        value: postgres
      - key: TSF_CONTROL_ROOM_PUBLIC_ENABLED
        value: "true"
      - key: TSF_CONTROL_ROOM_FOUNDER_ENABLED
        value: "false"
      - key: TSF_MODEL_PROVIDER
        value: dry-run
      - key: DATABASE_URL
        fromDatabase:
          name: synthetic-firm-postgres
          property: connectionString

  - type: cron
    name: the-synthetic-firm-scheduler-checkpoint
    env: python
    schedule: "0 8,9,10,12,13,14 * * 1-5"
    buildCommand: pip install -e ".[web,postgres]"
    startCommand: synthetic-firm scheduler-checkpoint-once
    envVars:
      - key: TSF_STORE_BACKEND
        value: postgres
      - key: TSF_MODEL_PROVIDER
        value: dry-run
      - key: DATABASE_URL
        fromDatabase:
          name: synthetic-firm-postgres
          property: connectionString

databases:
  - name: synthetic-firm-postgres
    plan: starter
